{% extends 'layout.html' %}
{% block title %}Register Hospital - Blood Bank Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width:500px;">
        <h2 class="auth-title">Register Your Hospital</h2>
        <p class="auth-subtitle">Register your hospital or blood bank to start posting requests.</p>

        <form method="POST" action="{{ url_for('auth.hospital_register') }}">

            <div class="mb-3">
                <label class="form-label" for="hospital_name">Hospital / Blood Bank Name</label>
                <input type="text" id="hospital_name" name="hospital_name" class="form-control"
                    placeholder="Full official name" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Official Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="contact@hospital.com"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" placeholder="Contact number" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="city">City / District</label>
                <input type="text" id="city" name="city" class="form-control" placeholder="Hospital location" required>
            </div>

            <div class="mb-4">
                <label class="form-label" for="password">Set Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Minimum 6 characters" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary-red w-100">Register Hospital</button>
        </form>

        <hr class="auth-divider">
        <p class="text-center small text-muted">
            Already registered?
            <a href="{{ url_for('auth.hospital_login') }}" style="color:var(--primary); font-weight:600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
