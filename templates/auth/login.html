{% extends 'layout.html' %}
{% block title %}Donor Login - Blood Bank Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Donor Login</h2>
        <p class="auth-subtitle">Enter your credentials to access your dashboard.</p>

        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="mb-3">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@email.com"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Your password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary-red w-100">Login</button>
        </form>

        <hr class="auth-divider">

        <p class="text-center small text-muted">
            Do not have an account?
            <a href="{{ url_for('auth.register') }}" style="color:var(--primary); font-weight:600;">
                Register here
            </a>
        </p>
        <p class="text-center small text-muted mt-2">
            Hospital?
            <a href="{{ url_for('auth.hospital_login') }}" style="color:var(--secondary); font-weight:500;">
                Hospital Login
            </a>
        </p>
    </div>
</div>
{% endblock %}
