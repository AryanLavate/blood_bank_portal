{% extends 'layout.html' %}
{% block title %}Hospital Login - Blood Bank Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Hospital Login</h2>
        <p class="auth-subtitle">Access your hospital dashboard.</p>

        <form method="POST" action="{{ url_for('auth.hospital_login') }}">
            <div class="mb-3">
                <label class="form-label" for="email">Registered Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="hospital@email.com"
                    required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Your password"
                    required>
            </div>
            <button type="submit" class="btn btn-primary-red w-100">Login as Hospital</button>
        </form>

        <hr class="auth-divider">
        <p class="text-center small text-muted">
            New hospital?
            <a href="{{ url_for('auth.hospital_register') }}" style="color:var(--primary); font-weight:600;">
                Register here
            </a>
        </p>
    </div>
</div>
{% endblock %}
